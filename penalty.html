<!DOCTYPE html>
<html>
<head>
    <title>Sequence Challenge</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f0f2f5; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); width: 480px; text-align: center; position: relative; }
        .penalty-ui { color: #e74c3c; border: 3px solid #e74c3c; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-weight: bold; background: #fdf2f2; }
        .game-ui { color: #2ecc71; border: 3px solid #2ecc71; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-weight: bold; background: #f2fdf5; }
        .timer-box { font-size: 24px; font-weight: bold; margin-bottom: 10px; color: #34495e; }
        input { padding: 15px; font-size: 18px; width: 180px; text-align: center; border: 2px solid #ddd; border-radius: 10px; outline: none; }
        button { background: #3498db; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 10px; cursor: pointer; margin-top: 15px; width: 100%; font-weight: bold; }
        button:hover { background: #2980b9; }
        #feedback { margin-top: 15px; font-weight: bold; height: 24px; }
        #game-screen { display: none; }
        #welcome-screen { text-align: left; }
        h1 { text-align: center; color: #2c3e50; }
        .stats-box { margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 10px; text-align: left; }
    </style>
</head>
<body>

<div class="card">
    <div id="welcome-screen">
        <h1 id="welcome-title">Welcome</h1>
        <p id="welcome-text"></p>
        <button onclick="startGame()">START</button>
    </div>

    <div id="game-screen">
        <div class="timer-box">TIME REMAINING: <span id="timer">90</span>s</div>
        <div id="uiBox">SCORE: 100</div>
        <hr>
        <p id="qText" style="font-size: 1.3em; font-weight: 600; margin: 20px 0; min-height: 40px;"></p>
        <input type="text" id="userInput" placeholder="Type answer..." autocomplete="off">
        <button onclick="check()">Submit Answer</button>
        <div id="feedback"></div>
    </div>
</div>

<script>
    // CONFIGURATION: Set to 'false' for the Game version (game.html)
    const penaltyMode = true; 
    const TOTAL_TIME = 90; 
    
    let score = 100;
    let current = 0;
    let attemptsOnLevel = 0;
    let totalIncorrect = 0;
    let timerInterval;
    let timeLeft = TOTAL_TIME;

    const levels = [
        {q: "5, 10, 15, 20, ...", a: "25"},
        {q: "12:00, 3:00, 6:00, ...", a: "9:00"},
        {q: "NW, NE, SE, ...", a: "SW"},
        {q: "1, 4, 9, 16, ...", a: "25"},
        {q: "M, T, W, T, ...", a: "F"},
        {q: "Z, Y, X, W, ...", a: "V"},
        {q: "1, 2, 6, 24, 120, ...", a: "720"},
        {q: "Triangle, Square, Pentagon, ...", a: "HEXAGON"},
        {q: "14, 28, 42, 70, 112, ...", a: "182"},
        {q: "J, F, M, A, M, J, J, ...", a: "A"}
    ];

    if (penaltyMode) {
        document.getElementById('welcome-title').innerText = "Sequence Assessment";
        document.getElementById('welcome-text').innerText = "You will start with 100 points and will be given a series of 10 questions. Each wrong answer will deduct 10 points from your score. You will have two chances to answer a question correctly. You will have " + TOTAL_TIME + " seconds to complete the assessment. Your score will be given to you at the end, please screenshot this.";
        document.querySelector('#welcome-screen button').innerText = "START ASSESSMENT";
    } else {
        document.getElementById('welcome-title').innerText = "Sequence Game!";
        document.getElementById('welcome-text').innerText = "You will be given 10 questions and have " + TOTAL_TIME + " seconds to solve them. You will have two chances to answer each question correctly. Please screenshot your results at the end and have fun!";
        document.querySelector('#welcome-screen button').innerText = "START GAME";
    }

    function startGame() {
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        updateUI();
        startTimer();
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                finishGame("TIME EXPIRED!");
            }
        }, 1000);
    }

    function updateUI() {
        attemptsOnLevel = 0;
        document.getElementById('qText').innerText = levels[current].q;
        document.getElementById('userInput').value = "";
        document.getElementById('userInput').focus();
        
        const uiBox = document.getElementById('uiBox');
        if (penaltyMode) {
            uiBox.className = "penalty-ui";
            uiBox.innerText = "SCORE: " + score;
        } else {
            uiBox.className = "game-ui";
            uiBox.innerText = "LEVEL: " + (current + 1) + " / 10";
        }
    }

    function check() {
        const input = document.getElementById('userInput').value.trim().toUpperCase();
        const feedback = document.getElementById('feedback');
        
        if (input === levels[current].a) {
            current++;
            feedback.innerText = "Correct!";
            feedback.style.color = "#2ecc71";
            if (current < levels.length) {
                setTimeout(() => { feedback.innerText = ""; updateUI(); }, 600);
            } else {
                clearInterval(timerInterval);
                finishGame("QUESTIONS COMPLETE!");
            }
        } else {
            attemptsOnLevel++;
            totalIncorrect++;
            if (penaltyMode) {
                score -= 10;
                document.getElementById('uiBox').innerText = "SCORE: " + score;
                if (attemptsOnLevel < 2) {
                    feedback.innerText = "INCORRECT. -10 POINTS. ONE MORE TRY.";
                    feedback.style.color = "#e74c3c";
                } else {
                    feedback.innerText = "INCORRECT. MOVING TO NEXT QUESTION.";
                    feedback.style.color = "#e74c3c";
                    moveToNext();
                }
            } else {
                if (attemptsOnLevel < 2) {
                    feedback.innerText = "Incorrect, try again!";
                    feedback.style.color = "#3498db";
                } else {
                    feedback.innerText = "Moving on to the next question!";
                    feedback.style.color = "#3498db";
                    moveToNext();
                }
            }
        }
    }

    function moveToNext() {
        current++;
        setTimeout(() => {
            if (current < levels.length) {
                document.getElementById('feedback').innerText = ""; 
                updateUI();
            } else {
                clearInterval(timerInterval);
                finishGame("QUESTIONS COMPLETE!");
            }
        }, 1200);
    }

function finishGame(reason) {
        let statsHTML = '';
        
        // This part now runs for BOTH versions to show Time Left
        statsHTML = `
            <div class="stats-box">
                <p><strong>Time Left:</strong> ${timeLeft} seconds</p>
                ${!penaltyMode ? `<p><strong>Incorrect Answers:</strong> ${totalIncorrect}</p>` : ''}
            </div>
        `;
        
        document.getElementById('game-screen').innerHTML = `
            <h1>${reason}</h1>
            <p style="font-size: 1.5em; margin-bottom: 10px;">
                ${penaltyMode ? 'Final Score: ' + score : 'Great Job!'}
            </p>
            ${statsHTML}
            <p style="margin-top: 20px;">Please screenshot this.</p>
        `;
    }
</script>
</body>
</html>
